<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Composter Web Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        /* Apple/iOS Modern Color Palette - Dark Mode */
        :root {
            --glass-bg: rgba(30, 30, 35, 0.45);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --text-main: #f5f5f7;
            --text-muted: #a1a1a6;
            --accent-blue: #0A84FF;
            --accent-green: #30D158;
            --accent-red: #FF453A;
            --accent-purple: #BF5AF2;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Elemen Gradien Latar Belakang untuk Efek Liquid/Kaca */
        .bg-blob-1 { position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vw; background: var(--accent-purple); border-radius: 50%; filter: blur(120px); opacity: 0.25; z-index: -1; }
        .bg-blob-2 { position: fixed; bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: var(--accent-blue); border-radius: 50%; filter: blur(140px); opacity: 0.2; z-index: -1; }

        h1 {
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 30px;
            text-align: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
            max-width: 1000px;
            width: 100%;
        }

        /* Glassmorphism Card Style */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 28px;
            box-shadow: var(--glass-shadow);
            flex: 1;
            min-width: 280px;
            display: flex;
            flex-direction: column;
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 15px;
            color: var(--text-muted);
        }

        .data-value {
            color: var(--text-main);
            font-weight: 600;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Glass Buttons dengan Transisi Glow */
        button {
            padding: 14px;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: white;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        button:active { transform: scale(0.96); }

        /* Tombol ON (Hijau Glow) */
        .btn-on { 
            background: rgba(48, 209, 88, 0.2); 
            border-color: rgba(48, 209, 88, 0.5); 
            width: 48%; 
            color: var(--accent-green);
            box-shadow: 0 0 15px rgba(48, 209, 88, 0.3);
        }
        .btn-on:hover { 
            background: rgba(48, 209, 88, 0.3); 
            box-shadow: 0 0 25px rgba(48, 209, 88, 0.7), inset 0 0 10px rgba(48, 209, 88, 0.2);
            text-shadow: 0 0 8px rgba(48, 209, 88, 0.8);
        }

        /* Tombol OFF (Merah Glow) */
        .btn-off { 
            background: rgba(255, 69, 58, 0.2); 
            border-color: rgba(255, 69, 58, 0.5); 
            width: 48%; 
            color: var(--accent-red);
            box-shadow: 0 0 15px rgba(255, 69, 58, 0.3);
        }
        .btn-off:hover { 
            background: rgba(255, 69, 58, 0.3); 
            box-shadow: 0 0 25px rgba(255, 69, 58, 0.7), inset 0 0 10px rgba(255, 69, 58, 0.2);
            text-shadow: 0 0 8px rgba(255, 69, 58, 0.8);
        }

        /* Tombol AUTO (Biru Glow) */
        .btn-auto { 
            background: rgba(10, 132, 255, 0.2); 
            border-color: rgba(10, 132, 255, 0.5); 
            width: 100%; 
            margin-top: 16px; 
            color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(10, 132, 255, 0.3);
        }
        .btn-auto:hover { 
            background: rgba(10, 132, 255, 0.3); 
            box-shadow: 0 0 25px rgba(10, 132, 255, 0.7), inset 0 0 10px rgba(10, 132, 255, 0.2);
            text-shadow: 0 0 8px rgba(10, 132, 255, 0.8);
        }

        /* Tombol Update Parameter (Soft White Glow) */
        .btn-update { 
            background: rgba(255, 255, 255, 0.1); 
            border-color: var(--glass-border); 
            width: 100%; 
            margin-top: 20px;
        }
        .btn-update:hover { 
            background: rgba(255, 255, 255, 0.2); 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Glass Inputs */
        label { font-size: 14px; color: var(--text-muted); margin-bottom: 6px; display: block; margin-top: 12px;}
        input {
            width: calc(100% - 32px);
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--accent-blue); background: rgba(0, 0, 0, 0.4); }

        .status-badge {
            text-align: center;
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-weight: 500;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="bg-blob-1"></div>
    <div class="bg-blob-2"></div>

    <h1>Composter Control</h1>
    
    <div class="container">
        <div class="card">
            <h2> Data Sensor</h2>
            <div class="data-row">Suhu SHT31 <span id="v_temp_sht" class="data-value">-- °C</span></div>
            <div class="data-row">Kelembapan SHT31 <span id="v_hum_sht" class="data-value">-- %</span></div>
            <div class="data-row">Suhu Kompos <span id="v_temp_comp" class="data-value">-- °C</span></div>
            <div class="data-row">Sprayer <span id="v_relay" class="data-value">--</span></div>
            <div class="data-row">Mode Operasi <span id="v_mode" class="data-value">--</span></div>
            <div class="data-row" style="margin-top: auto; padding-top: 16px; border-top: 1px solid var(--glass-border);">
                Koneksi Server <span id="v_koneksi" class="data-value" style="color: var(--accent-red);">Terputus</span>
            </div>
        </div>

        <div class="card">
            <h2> Kontrol Manual</h2>
            <div id="status_mode" class="status-badge">Sinkronisasi data sistem...</div>
            <div style="display: flex; justify-content: space-between;">
                <button class="btn-on" onclick="sendCmd('ON')">Aktifkan</button>
                <button class="btn-off" onclick="sendCmd('OFF')">Matikan</button>
            </div>
            <button class="btn-auto" onclick="sendCmd('AUTO')">Otomatisasi Berbasis Sensor</button>
        </div>

        <div class="card">
            <h2> Parameter Suhu</h2>
            <label>Batas Suhu Menyala (ON) °C</label>
            <input type="number" id="inp_on" value="30" step="0.1">
            
            <label>Batas Suhu Mati (OFF) °C</label>
            <input type="number" id="inp_off" value="28" step="0.1">
            
            <button class="btn-update" onclick="updateThreshold()">Terapkan Parameter</button>
        </div>
    </div>

<script>
    const host = 'wss://a19d83f6ee294e8abcffa331b8309ef3.s1.eu.hivemq.cloud:8884/mqtt';
    
    const options = {
        username: '3M_Composter_MQ',
        password: 'Meka1234',
        clientId: 'WebClient_' + Math.random().toString(16).substr(2, 8)
    };

    const client = mqtt.connect(host, options);

    client.on('connect', () => {
        const connBadge = document.getElementById('v_koneksi');
        connBadge.innerText = "Terhubung";
        connBadge.style.color = "var(--accent-green)";
        connBadge.style.background = "rgba(48, 209, 88, 0.1)";
        connBadge.style.borderColor = "rgba(48, 209, 88, 0.3)";
        connBadge.style.boxShadow = "0 0 10px rgba(48, 209, 88, 0.2)";
        client.subscribe('composter/sensor/data');
    });

    client.on('error', (err) => { client.end(); });

    client.on('offline', () => {
        const connBadge = document.getElementById('v_koneksi');
        connBadge.innerText = "Terputus";
        connBadge.style.color = "var(--accent-red)";
        connBadge.style.background = "rgba(255, 69, 58, 0.1)";
        connBadge.style.borderColor = "rgba(255, 69, 58, 0.3)";
        connBadge.style.boxShadow = "0 0 10px rgba(255, 69, 58, 0.2)";
    });

    client.on('message', (topic, message) => {
        if (topic === 'composter/sensor/data') {
            try {
                const data = JSON.parse(message.toString());
                
                document.getElementById('v_temp_sht').innerText = data.temp_sht.toFixed(1) + ' °C';
                document.getElementById('v_hum_sht').innerText = data.hum_sht.toFixed(1) + ' %';
                document.getElementById('v_temp_comp').innerText = data.temp_comp.toFixed(1) + ' °C';
                
                const relayBadge = document.getElementById('v_relay');
                if (data.relay_status) {
                    relayBadge.innerText = 'MENYALA';
                    relayBadge.style.color = 'var(--accent-green)';
                    relayBadge.style.background = 'rgba(48, 209, 88, 0.15)';
                    relayBadge.style.boxShadow = '0 0 10px rgba(48, 209, 88, 0.2)';
                } else {
                    relayBadge.innerText = 'STANDBY';
                    relayBadge.style.color = 'var(--accent-red)';
                    relayBadge.style.background = 'rgba(255, 69, 58, 0.15)';
                    relayBadge.style.boxShadow = '0 0 10px rgba(255, 69, 58, 0.2)';
                }

                document.getElementById('v_mode').innerText = data.mode;
                const statusBadge = document.getElementById('status_mode');
                if (data.mode === 'MANUAL') {
                    statusBadge.innerText = "Sistem Overridden (Sensor Diabaikan)";
                    statusBadge.style.color = "var(--accent-red)";
                    statusBadge.style.background = "rgba(255, 69, 58, 0.1)";
                    statusBadge.style.borderColor = "rgba(255, 69, 58, 0.3)";
                    statusBadge.style.boxShadow = "0 0 15px rgba(255, 69, 58, 0.15)";
                } else {
                    statusBadge.innerText = "Sistem Otomatis Berjalan";
                    statusBadge.style.color = "var(--accent-green)";
                    statusBadge.style.background = "rgba(48, 209, 88, 0.1)";
                    statusBadge.style.borderColor = "rgba(48, 209, 88, 0.3)";
                    statusBadge.style.boxShadow = "0 0 15px rgba(48, 209, 88, 0.15)";
                }
            } catch (e) {
                console.error("Parse Error: ", e);
            }
        }
    });

    function sendCmd(cmd) {
        if (client.connected) {
            client.publish('composter/relay/cmd', cmd);
        } else {
            alert("Koneksi ke server terputus.");
        }
    }

    function updateThreshold() {
        if (client.connected) {
            const onVal = parseFloat(document.getElementById('inp_on').value);
            const offVal = parseFloat(document.getElementById('inp_off').value);
            const payload = JSON.stringify({ on: onVal, off: offVal });
            client.publish('composter/threshold/cmd', payload);
        } else {
            alert("Koneksi ke server terputus.");
        }
    }
</script>

</body>
</html>
